<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TurfTime</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar-container">
            <div class="logo">🏏 ⚽ 🏸 TurfTime</div>
            <nav class="main-nav" id="main-nav">
                <a href="index.html">Home</a>
                <a href="index.html#search-section">Search Turf</a>
                <a href="booking.html">Book Slot</a>
                <a href="history.html">Booking History</a>
                <a href="#footer">Contact</a>
            </nav>
            <div class="navbar-right">
                <button id="dark-mode-toggle" class="theme-toggle">Dark Mode</button>
                <a href="login.html" id="login-link" class="login-link">Login</a>
                <div id="profile-container" class="profile-container" style="display:none;">
                    <div id="profile-icon" class="profile-icon"></div>
                    <div id="profile-dropdown" class="profile-dropdown" style="display:none;">
                        <div class="dropdown-header">Username: <span id="dropdown-username"></span></div>
                        <div class="dropdown-phone">Phone: <span id="dropdown-phone"></span></div>
                        <hr>
                        <a href="#" id="profile-booking">Booking History</a>
                        <a href="#" id="profile-logout">Logout</a>
                    </div>
                </div>
            </div>
            <div class="hamburger" id="hamburger">☰</div>
        </div>
    </header>
    <main>
        <div class="auth-container">
            <div class="auth-card">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="auth-btn">Login</button>
                </form>
                <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
                <div id="auth-message"></div>
            </div>
        </div>
    </main>
    <footer id="footer">
        <div class="footer-content">
            <h3>TurfTime</h3>
            <p>Reserve your game slot</p>
            <div class="contact-info">
                <p><strong>Location:</strong> Vellore</p>
                <p><strong>Phone:</strong> +91 8148172556</p>
            </div>
        </div>
        <p>&copy; 2026 TurfTime. All rights reserved.</p>
    </footer>
    <script src="js/auth.js"></script>
</body>
</html>
